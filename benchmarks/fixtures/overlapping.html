<!DOCTYPE html>
<html>
<head>
<title>Overlapping Elements Test</title>
<style>
  .container { position: relative; width: 400px; height: 300px; margin: 20px; }
  .overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.01); z-index: 10;
    pointer-events: none;
  }
  .real-button {
    position: relative; z-index: 5; padding: 12px 24px;
    background: #007bff; color: white; border: none; cursor: pointer;
  }
  .hidden-trap {
    position: absolute; top: 0; left: 0; width: 0; height: 0;
    overflow: hidden; opacity: 0;
  }
  .offscreen {
    position: absolute; left: -9999px; top: -9999px;
  }
</style>
</head>
<body>
  <h1>Overlapping & Hidden Elements</h1>

  <!-- Visible button with an invisible overlay on top -->
  <div class="container">
    <button class="real-button" id="submit-btn" aria-label="Submit Order">Submit Order</button>
    <div class="overlay" id="invisible-overlay"></div>
  </div>

  <!-- Duplicate buttons: one hidden, one visible -->
  <button class="hidden-trap" aria-label="Add to Cart" tabindex="-1">Add to Cart</button>
  <button id="add-cart-visible" aria-label="Add to Cart">Add to Cart</button>

  <!-- Offscreen honeypot input -->
  <input type="text" class="offscreen" name="email" placeholder="Email" aria-label="Email Honeypot">
  <input type="email" name="email" placeholder="Email address" aria-label="Email" id="real-email">

  <!-- Zero-pixel element trap -->
  <div style="width:0;height:0;overflow:hidden;">
    <a href="#" aria-label="Contact Us">Contact Us</a>
  </div>
  <a href="/contact" aria-label="Contact Us" id="real-contact">Contact Us</a>
</body>
</html>
