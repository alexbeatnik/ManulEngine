# ============================================================================
# Reusable example: Run ManulEngine .hunt tests in any repository's CI
# Copy this file to your project's .github/workflows/ directory and change
# the trigger to suit your needs (e.g. on: [push, pull_request]).
#
# This file lives in the ManulEngine repo as a reference template.
# It is set to workflow_dispatch so it does NOT run automatically here.
# ============================================================================

name: Manul E2E Tests (example)

on:
  workflow_dispatch:

jobs:
  manul:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run hunt tests
        run: |
          docker run --rm \
            --shm-size=1g \
            -v ${{ github.workspace }}/hunts:/workspace/hunts:ro \
            -v ${{ github.workspace }}/reports:/workspace/reports \
            -v ${{ github.workspace }}/controls:/workspace/controls:ro \
            -v ${{ github.workspace }}/scripts:/workspace/scripts:ro \
            -e MANUL_HEADLESS=true \
            -e MANUL_HTML_REPORT=true \
            -e MANUL_SCREENSHOT=on-fail \
            -e MANUL_WORKERS=2 \
            ghcr.io/alexbeatnik/manul-engine:0.0.9.28 \
            --html-report --screenshot on-fail --workers 2 hunts/

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: manul-report
          path: reports/
