name: Lint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install ruff
      - name: Ruff check
        run: ruff check manul_engine/
      - name: Ruff format check
        run: ruff format --check manul_engine/ || echo "::warning::Code formatting differences found. Run 'ruff format manul_engine/' locally."
