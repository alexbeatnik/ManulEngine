name: Synthetic Tests

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  synthetic-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MANUL_CONTROLS_CACHE_ENABLED: "False"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          playwright install chromium --with-deps

      - name: Run synthetic engine tests
        run: |
          python run_tests.py
